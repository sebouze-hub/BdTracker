name: Build APK

# Se déclenche à chaque push sur la branche main, et peut aussi être lancé manuellement
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compiler l'APK de debug
        run: gradle assembleDebug

      - name: Publier l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: BdTracker-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
